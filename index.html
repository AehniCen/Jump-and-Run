<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Jump'n'Run</title>
    <script src="models/level.class.js"></script>
    <script src="models/keyboard.class.js"></script>
    <script src="models/drawable-objects.class.js"></script>
    <script src="models/background-objects.class.js"></script>
    <script src="models/movable-objects.class.js"></script>
    <script src="models/throwable-objects.class.js"></script>
    <script src="models/status-bar.class.js"></script>
    <script src="models/coin-display.class.js"></script>
    <script src="models/bottle-display.class.js"></script>
    <script src="models/collectable-objects.class.js"></script>

    <script src="models/world.class.js"></script>

</head>
<body onload="init()">

    <h1>El Pollo Loco</h1>

    <div id="start-div">
        <button id="start-btn" onclick="startGame()">
            <p>Start Game</p>
        </button>
    </div>

    <div id="pause-div" style="display: none;">
        <p>Pause</p>
        <div id="pause-btns">
            <button onclick="backToGame()">Back To Game</button>
            <button onclick="restartGame()">Restart</button>
            <button onclick="backToStartMenu()">Back To Start Menu</button>
        </div>
    </div>
    
    <canvas id="canvas" width="720" height="480">

    </canvas>

</body>
