<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Jump'n'Run</title>
    <script src="models/level.class.js"></script>
    <script src="models/keyboard.class.js"></script>
    <script src="models/drawable-objects.class.js"></script>
    <script src="models/background-objects.class.js"></script>
    <script src="models/movable-objects.class.js"></script>
    <script src="models/throwable-objects.class.js"></script>
    <script src="models/status-bar.class.js"></script>
    <script src="models/coin-display.class.js"></script>
    <script src="models/bottle-display.class.js"></script>
    <script src="models/collectable-objects.class.js"></script>
    <script src="models/endscreen.class.js"></script>
    <script src="models/character.class.js"></script>
    <script src="models/chicken.class.js"></script>
    <script src="models/endboss.class.js"></script>
    <script src="models/world.class.js"></script>
    <script src="levels/level1.js"></script>
    <script src="js/game.js"></script>
    
</head>
<body onload="init()">

    <h1>El Pollo Loco</h1>

    <div id="start-div" class="overlay-divs">
        <button id="start-btn" onclick="startGame()">
            <p>Start Game</p>
        </button>
    </div>

    <div id="pause-div" class="overlay-divs" style="display: none;">
        <p>Pause</p>
        <button id="mute-btn" onclick="toggleSound()">
            <img src="assets/icons/sound.png" alt="sound-on-icon">
        </button>
        <div id="pause-btns">
            <button class="menu-btns" onclick="backToGame()">Back To Game</button>
            <button id="restart-btn" class="menu-btns" onclick="restartGame()">
                <img id="restart-arrow" src="assets/icons/restart-arrow.png" alt="">Restart
            </button>
            <button id="start-menu-btn" class="menu-btns" onclick="backToStartMenu()">
                <img id="start-menu-arrow" src="assets/icons/back-arrow-red.png" alt=""> Back To Start Menu
            </button>
        </div>
    </div>

    <div id="endscreen-div" class="overlay-divs" style="display: none;">
        <img id=game-over-img src="assets/img/winning_loosing/game_over_endscreen.png" alt="game-over-endscreen">
        <button id="restart-btn" class="menu-btns" onclick="restartGame()">
            <img id="restart-arrow" src="assets/icons/restart-arrow.png" alt="">Restart
        </button>
        <button id="start-menu-btn" class="menu-btns" onclick="backToStartMenu()">
            <img id="start-menu-arrow" src="assets/icons/back-arrow-red.png" alt=""> Back To Start Menu
        </button>
    </div>
    
    <canvas id="canvas" width="2000" height="1000">

    </canvas>

</body>
</html>
